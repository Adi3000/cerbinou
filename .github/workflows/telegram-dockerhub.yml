name: Build and Push Telegram Image

on:
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - "telegram/**"
      - ".github/workflows/telegram-dockerhub.yml"
  pull_request:
    paths:
      - "telegram/**"
      - ".github/workflows/telegram-dockerhub.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: zulizzz/cerbinou-telegram

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.TELEGRAM_BOT_DOCKER_USER }}
          password: ${{ secrets.TELEGRAM_BOT_DOCKER_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./telegram
          file: ./telegram/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
